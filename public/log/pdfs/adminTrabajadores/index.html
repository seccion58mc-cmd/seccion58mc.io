<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajadores - Planta y Eventuales</title>
    <!-- Fuente moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome (iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Aplica el tema guardado antes de pintar para evitar parpadeo -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('adminTheme') || 'dark');</script>

    <style>
        :root {
            --bg-base:      #080C14;
            --bg-surface:   #0D1220;
            --bg-card:      #111827;
            --blue:         #00BFA5; /* Ajustado al theme propuesto */
            --blue-bright:  #1DE9B6;
            --blue-dim:     #00897B;
            --text-primary: #F0F4FF;
            --text-sec:     #8FA3C0;
            --text-dim:     #4A6080;
            --border:       rgba(0,191,165,0.18);
            --border-bright:rgba(0,191,165,0.45);
            --glow:         0 0 32px rgba(0,191,165,0.28);
            --radius:       14px;
            --transition:   0.25s cubic-bezier(0.4,0,0.2,1);

            --planta-bg:    rgba(29, 78, 216, 0.2);
            --planta-text:  #60A5FA;
            --planta-border:rgba(29, 78, 216, 0.4);
            
            --eventual-bg:  rgba(194, 65, 12, 0.2);
            --eventual-text:#FB923C;
            --eventual-border:rgba(194, 65, 12, 0.4);
            
            --danger:       #ef4444;
            --danger-bg:    rgba(239, 68, 68, 0.15);
        }

        /* ===== Tema claro: los negros pasan a blanco, acentos se mantienen ===== */
        [data-theme="light"] {
            --bg-base:      #EEF2F8;
            --bg-surface:   #FFFFFF;
            --bg-card:      #FFFFFF;
            --text-primary: #0D1220;
            --text-sec:     #4A5B78;
            --text-dim:     #8A9BB5;
            --border:       rgba(0,137,123,0.25);
            --border-bright:rgba(0,137,123,0.4);
            --glow:         0 4px 24px rgba(0,0,0,0.08);
            --planta-bg:    rgba(37,99,235,0.1);
            --eventual-bg:  rgba(234,88,12,0.1);
        }
        [data-theme="light"] header { background: rgba(255,255,255,0.85); }
        [data-theme="light"] header h1 { color: #0D1220; }
        [data-theme="light"] .back { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .back:hover { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.15); }
        [data-theme="light"] #searchInput { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.12); }
        [data-theme="light"] #searchInput:focus { background: rgba(0,191,165,0.06); }
        [data-theme="light"] .col { border-color: rgba(0,0,0,0.08); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        [data-theme="light"] .col-head { border-bottom-color: rgba(0,0,0,0.06); }
        [data-theme="light"] .cnt { background: rgba(0,0,0,0.06); color: #0D1220; }
        [data-theme="light"] .form-alta { background: rgba(0,0,0,0.02); border-bottom-color: rgba(0,0,0,0.06); }
        [data-theme="light"] .alta-nombre { background: #fff; border-color: rgba(0,0,0,0.12); }
        [data-theme="light"] .alta-nombre:focus { background: #fff; }
        [data-theme="light"] .sugerencias { border-color: rgba(0,0,0,0.12); box-shadow: 0 8px 30px rgba(0,0,0,.15); }
        [data-theme="light"] .sug-item { border-bottom-color: rgba(0,0,0,0.06); }
        [data-theme="light"] .sug-item:hover { background: rgba(0,0,0,0.04); }
        [data-theme="light"] .lista li { border-bottom-color: rgba(0,0,0,0.05); }
        [data-theme="light"] .lista li:hover { background: rgba(0,0,0,0.03); }
        [data-theme="light"] .lista::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
        [data-theme="light"] .modal { background: rgba(0,0,0,.4); }
        [data-theme="light"] .modal-card { border-color: rgba(0,0,0,0.1); box-shadow: 0 20px 50px rgba(0,0,0,.2); }
        [data-theme="light"] .mc-titulo { color: #0D1220; }
        [data-theme="light"] .mc-cancel { background: rgba(0,0,0,0.06); }
        [data-theme="light"] .mc-cancel:hover { background: rgba(0,0,0,0.1); }
        [data-theme="light"] .toast { color: #0D1220; border-color: rgba(0,0,0,0.1); box-shadow: 0 10px 30px rgba(0,0,0,.2); }

        .theme-toggle {
            background: rgba(255,255,255,.05);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            width: 42px; height: 42px; border-radius: 8px;
            cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
        }
        .theme-toggle:hover { background: rgba(255,255,255,.1); transform: translateY(-2px); }
        [data-theme="light"] .theme-toggle { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .theme-toggle:hover { background: rgba(0,0,0,0.08); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif;
            background: var(--bg-base); 
            color: var(--text-primary); 
            padding: 24px; 
            min-height: 100vh; 
        }
        .wrap { max-width: 1150px; margin: 0 auto; }

        header { 
            background: rgba(17,24,39,0.7); 
            border: 1px solid var(--border-bright);
            box-shadow: var(--glow);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 22px 26px; 
            margin-bottom: 24px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            gap: 16px; 
            flex-wrap: wrap; 
        }
        header h1 { font-size: 24px; font-weight: 700; color: #fff; display:flex; align-items:center; gap: 10px;}
        header h1 i { color: var(--blue-bright); }
        header p { font-size: 13px; color: var(--text-sec); margin-top: 6px; }
        
        .back { 
            background: rgba(255,255,255,.05); 
            color: var(--text-primary); 
            text-decoration: none; 
            padding: 10px 18px;
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 600; 
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all var(--transition);
        }
        .back:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }

        .aviso { 
            background: rgba(245, 158, 11, 0.1); 
            border: 1px solid rgba(245, 158, 11, 0.3); 
            color: #FBBF24; 
            border-radius: 10px;
            padding: 14px 18px; 
            margin-bottom: 20px; 
            font-size: 14px; 
            display: flex; 
            gap: 16px;
            align-items: center; 
            flex-wrap: wrap; 
        }
        .btn-sembrar { 
            background: #f59e0b; 
            color: #fff; 
            border: 0; 
            padding: 9px 16px; 
            border-radius: 8px;
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: background 0.2s;
        }
        .btn-sembrar:hover { background: #d97706; }

        .toolbar { margin-bottom: 24px; position: relative; }
        .toolbar i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        #searchInput { 
            width: 100%; 
            padding: 14px 14px 14px 44px; 
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-primary);
            border-radius: 10px; 
            font-size: 15px; 
            font-family: 'Inter', sans-serif;
            transition: all var(--transition);
        }
        #searchInput:focus { 
            outline: none; 
            border-color: var(--blue); 
            background: rgba(0,191,165,0.05);
            box-shadow: 0 0 0 3px rgba(0,191,165,.15); 
        }

        #loading { text-align: center; padding: 40px; color: var(--text-sec); font-size: 16px; }

        .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .col { 
            background: var(--bg-card); 
            border-radius: var(--radius); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05); 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }
        
        .col-head { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .col-head h2 { font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .col-head--planta { background: var(--planta-bg); border-bottom-color: var(--planta-border); }
        .col-head--planta h2 { color: var(--planta-text); }
        .col-head--eventual { background: var(--eventual-bg); border-bottom-color: var(--eventual-border); }
        .col-head--eventual h2 { color: var(--eventual-text); }
        
        .col-head .cnt { 
            background: rgba(0,0,0,0.3); 
            padding: 4px 12px; 
            border-radius: 20px;
            font-size: 14px; 
            font-weight: 700;
            color: #fff;
        }

        .form-alta { display: flex; gap: 12px; padding: 16px 22px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); }
        .alta-input-wrap { position: relative; flex: 1; min-width: 0; }
        .alta-nombre { 
            width: 100%; 
            padding: 10px 14px; 
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-primary);
            border-radius: 8px; 
            font-size: 14px; 
            transition: all 0.2s;
        }
        .alta-nombre:focus { outline: none; border-color: var(--blue); background: rgba(255,255,255,0.1); }
        
        .sugerencias { 
            position: absolute; 
            top: calc(100% + 4px); 
            left: 0; right: 0; 
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 9px; 
            box-shadow: 0 8px 30px rgba(0,0,0,.5);
            max-height: 220px; 
            overflow-y: auto; 
            z-index: 20; 
        }
        .sug-item { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-primary); cursor: pointer; }
        .sug-item:hover { background: rgba(255,255,255,0.05); }
        .sug-item:last-child { border-bottom: 0; }
        .sug-existe { padding: 10px 14px; font-size: 13px; font-weight: 700; color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        
        .btn-alta { 
            border: 0; 
            padding: 10px 16px; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 700;
            cursor: pointer; 
            color: #fff; 
            white-space: nowrap; 
            transition: all 0.2s;
        }
        .btn-alta--planta { background: #2563eb; } 
        .btn-alta--planta:hover { background: #1d4ed8; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-alta--eventual { background: #ea580c; } 
        .btn-alta--eventual:hover { background: #c2410c; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3); }

        .lista { list-style: none; max-height: 55vh; overflow-y: auto; padding: 10px 0; }
        /* Scrollbar styles for list */
        .lista::-webkit-scrollbar { width: 6px; }
        .lista::-webkit-scrollbar-track { background: transparent; }
        .lista::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .lista::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        .lista li { 
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 12px 22px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; 
            transition: background 0.2s;
        }
        .lista li:hover { background: rgba(255,255,255,0.02); }
        .lista li:last-child { border-bottom: 0; }
        .lista .nombre { line-height: 1.4; font-weight: 500; }
        .lista .empty { color: var(--text-sec); justify-content: center; padding: 30px; text-align: center; }
        
        .btn-baja { 
            background: var(--danger-bg); 
            color: var(--danger); 
            border: 1px solid rgba(239, 68, 68, 0.3); 
            padding: 6px 10px; 
            border-radius: 6px;
            font-size: 13px; 
            cursor: pointer; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-baja:hover { background: rgba(239, 68, 68, 0.25); border-color: var(--danger); }
        
        .nota-semilla { font-size: 12px; color: #F59E0B; font-style: italic; white-space: nowrap; }

        /* Modal de confirmación */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
            align-items: center; justify-content: center; padding: 20px; z-index: 100; 
            backdrop-filter: blur(4px);
        }
        .modal-card { 
            background: var(--bg-card); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius); 
            padding: 28px; 
            max-width: 420px; 
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,.5); 
        }
        .mc-titulo { font-size: 18px; margin-bottom: 12px; font-weight: 700; color: #fff;}
        .mc-mensaje { font-size: 15px; color: var(--text-sec); line-height: 1.5; margin-bottom: 24px; }
        .mc-btns { display: flex; gap: 12px; justify-content: flex-end; }
        .mc-cancel, .mc-ok { border: 0; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .mc-cancel { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .mc-cancel:hover { background: rgba(255,255,255,0.15); }
        .mc-ok { background: var(--blue); color: #000; }
        .mc-ok:hover { background: var(--blue-bright); }
        .mc-ok--peligro { background: var(--danger); color: #fff; } 
        .mc-ok--peligro:hover { background: #b91c1c; }

        /* Toast */
        .toast { 
            position: fixed; left: 50%; bottom: 26px; transform: translate(-50%, 20px);
            background: var(--bg-card); color: #fff; padding: 14px 24px; border-radius: 10px; font-size: 14px;
            font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.4); opacity: 0; pointer-events: none;
            transition: opacity .3s, transform .3s; z-index: 110; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }
        .toast--ok { border-left: 4px solid #10b981; }
        .toast--error { border-left: 4px solid #ef4444; }

        @media (max-width: 768px) { 
            body { padding: 16px; } 
            .cols { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div>
                <h1><i class="fa-solid fa-hard-hat"></i> Trabajadores</h1>
                <p>Planta y eventuales &middot; fuente de la verdad para todos los modulos</p>
            </div>
            <a class="back" href="../index.html"><i class="fa-solid fa-arrow-left" style="margin-right:6px"></i> Volver al panel</a>
        </header>

        <div id="avisoSemilla" class="aviso" style="display:none;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Estos son los trabajadores que <strong>ya estaban</strong> en la lista base. Aun <strong>no estan guardados</strong>. Guardalos una vez para poder darlos de alta/baja.</span>
            <button class="btn-sembrar" id="btnSembrar" style="display:none;"><i class="fa-solid fa-seedling" style="margin-right:6px"></i> Sembrar lista base</button>
        </div>

        <div class="toolbar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Buscar por nombre en ambas listas...">
        </div>

        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Cargando trabajadores...</div>

        <div class="cols">
            <section class="col">
                <div class="col-head col-head--planta">
                    <h2><i class="fa-solid fa-industry"></i> Planta</h2>
                    <span class="cnt" id="cntPlanta">0</span>
                </div>
                <form class="form-alta" data-tipo="PLANTA">
                    <div class="alta-input-wrap">
                        <input type="text" class="alta-nombre" placeholder="APELLIDO PATERNO MATERNO NOMBRE(S)" autocomplete="off">
                        <div class="sugerencias" hidden></div>
                    </div>
                    <button type="submit" class="btn-alta btn-alta--planta"><i class="fa-solid fa-plus"></i> Dar de alta</button>
                </form>
                <ul class="lista" id="listaPlanta"></ul>
            </section>

            <section class="col">
                <div class="col-head col-head--eventual">
                    <h2><i class="fa-solid fa-clipboard-user"></i> Eventuales</h2>
                    <span class="cnt" id="cntEventual">0</span>
                </div>
                <form class="form-alta" data-tipo="EVENTUAL">
                    <div class="alta-input-wrap">
                        <input type="text" class="alta-nombre" placeholder="APELLIDO PATERNO MATERNO NOMBRE(S)" autocomplete="off">
                        <div class="sugerencias" hidden></div>
                    </div>
                    <button type="submit" class="btn-alta btn-alta--eventual"><i class="fa-solid fa-plus"></i> Dar de alta</button>
                </form>
                <ul class="lista" id="listaEventual"></ul>
            </section>
        </div>
    </div>

    <div class="modal" id="modalConfirm">
        <div class="modal-card">
            <h3 class="mc-titulo"></h3>
            <p class="mc-mensaje"></p>
            <div class="mc-btns">
                <button class="mc-cancel">Cancelar</button>
                <button class="mc-ok">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { db } from '../../../firebase-config.js';
        window.db = db;
    </script>
    <script type="module" src="adminTrabajadores.js"></script>
</body>
</html>
