<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajadores - Planta y Eventuales</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f5f7; color: #1f2430; padding: 20px; min-height: 100vh; }
        .wrap { max-width: 1150px; margin: 0 auto; }

        header { background: linear-gradient(135deg, #0f766e, #115e59); color: #fff; border-radius: 14px;
            padding: 22px 26px; margin-bottom: 20px; display: flex; justify-content: space-between;
            align-items: center; gap: 16px; flex-wrap: wrap; }
        header h1 { font-size: 22px; }
        header p { font-size: 13px; opacity: .9; margin-top: 4px; }
        .back { background: rgba(255,255,255,.18); color: #fff; text-decoration: none; padding: 9px 16px;
            border-radius: 8px; font-size: 14px; font-weight: 600; white-space: nowrap; }
        .back:hover { background: rgba(255,255,255,.3); }

        .aviso { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; border-radius: 10px;
            padding: 12px 16px; margin-bottom: 14px; font-size: 14px; display: flex; gap: 14px;
            align-items: center; flex-wrap: wrap; }
        .btn-sembrar { background: #f59e0b; color: #fff; border: 0; padding: 9px 16px; border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .btn-sembrar:hover { background: #d97706; }

        .toolbar { margin-bottom: 16px; }
        #searchInput { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; }
        #searchInput:focus { outline: none; border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15,118,110,.15); }

        #loading { text-align: center; padding: 40px; color: #6b7280; font-size: 16px; }

        .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .col { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
            border: 1px solid #eef0f3; overflow: hidden; }
        .col-head { padding: 16px 18px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .col-head--planta { background: #1d4ed8; }
        .col-head--eventual { background: #c2410c; }
        .col-head h2 { font-size: 17px; }
        .col-head .cnt { background: rgba(255,255,255,.22); padding: 2px 10px; border-radius: 20px;
            font-size: 13px; font-weight: 700; }

        .form-alta { display: flex; gap: 8px; padding: 14px 18px; border-bottom: 1px solid #eef0f3; background: #f8fafc; }
        .alta-input-wrap { position: relative; flex: 1; min-width: 0; }
        .alta-nombre { width: 100%; padding: 9px 11px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
        .sugerencias { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff;
            border: 1px solid #d1d5db; border-radius: 9px; box-shadow: 0 8px 24px rgba(0,0,0,.14);
            max-height: 220px; overflow-y: auto; z-index: 20; }
        .sug-item { padding: 8px 11px; font-size: 13px; border-bottom: 1px solid #f1f3f5; color: #374151; }
        .sug-item:last-child { border-bottom: 0; }
        .sug-existe { padding: 8px 11px; font-size: 13px; font-weight: 700; color: #b91c1c; background: #fee2e2; }
        .alta-nombre:focus { outline: none; border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15,118,110,.12); }
        .btn-alta { border: 0; padding: 9px 14px; border-radius: 8px; font-size: 14px; font-weight: 700;
            cursor: pointer; color: #fff; white-space: nowrap; }
        .btn-alta--planta { background: #1d4ed8; } .btn-alta--planta:hover { background: #1e40af; }
        .btn-alta--eventual { background: #c2410c; } .btn-alta--eventual:hover { background: #9a3412; }

        .lista { list-style: none; max-height: 62vh; overflow-y: auto; }
        .lista li { display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 10px 18px; border-bottom: 1px solid #f1f3f5; font-size: 14px; }
        .lista li:last-child { border-bottom: 0; }
        .lista .nombre { line-height: 1.3; }
        .lista .empty { color: #9ca3af; justify-content: center; padding: 24px; }
        .btn-baja { background: #fee2e2; color: #b91c1c; border: 0; padding: 5px 9px; border-radius: 7px;
            font-size: 14px; cursor: pointer; }
        .btn-baja:hover { background: #fecaca; }
        .nota-semilla { font-size: 12px; color: #b45309; font-style: italic; white-space: nowrap; }

        /* Modal de confirmación */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.5);
            align-items: center; justify-content: center; padding: 20px; z-index: 50; }
        .modal-card { background: #fff; border-radius: 14px; padding: 24px; max-width: 420px; width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,.25); }
        .mc-titulo { font-size: 18px; margin-bottom: 10px; }
        .mc-mensaje { font-size: 15px; color: #374151; line-height: 1.5; margin-bottom: 20px; }
        .mc-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .mc-cancel, .mc-ok { border: 0; padding: 10px 18px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .mc-cancel { background: #e5e7eb; color: #374151; }
        .mc-cancel:hover { background: #d1d5db; }
        .mc-ok { background: #0f766e; color: #fff; }
        .mc-ok:hover { background: #115e59; }
        .mc-ok--peligro { background: #dc2626; } .mc-ok--peligro:hover { background: #b91c1c; }

        /* Toast */
        .toast { position: fixed; left: 50%; bottom: 26px; transform: translate(-50%, 20px);
            background: #111827; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px;
            font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.25); opacity: 0; pointer-events: none;
            transition: opacity .2s, transform .2s; z-index: 60; }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }
        .toast--ok { background: #15803d; }
        .toast--error { background: #b91c1c; }

        @media (max-width: 640px) { body { padding: 12px; } .cols { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div>
                <h1>👷 Trabajadores</h1>
                <p>Planta y eventuales · fuente de la verdad para todos los módulos</p>
            </div>
            <a class="back" href="../index.html">← Volver al panel</a>
        </header>

        <div id="avisoSemilla" class="aviso" style="display:none;">
            <span>Estos son los trabajadores que <strong>ya estaban</strong> en la lista base. Aún <strong>no están guardados</strong>. Guárdalos una vez para poder darlos de alta/baja.</span>
            <button class="btn-sembrar" id="btnSembrar" style="display:none;">Sembrar lista base</button>
        </div>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Buscar por nombre en ambas listas...">
        </div>

        <div id="loading">Cargando trabajadores…</div>

        <div class="cols">
            <section class="col">
                <div class="col-head col-head--planta">
                    <h2>🏭 Planta</h2>
                    <span class="cnt" id="cntPlanta">0</span>
                </div>
                <form class="form-alta" data-tipo="PLANTA">
                    <div class="alta-input-wrap">
                        <input type="text" class="alta-nombre" placeholder="APELLIDO PATERNO  MATERNO  NOMBRE(S)" autocomplete="off">
                        <div class="sugerencias" hidden></div>
                    </div>
                    <button type="submit" class="btn-alta btn-alta--planta">＋ Dar de alta</button>
                </form>
                <ul class="lista" id="listaPlanta"></ul>
            </section>

            <section class="col">
                <div class="col-head col-head--eventual">
                    <h2>📋 Eventuales</h2>
                    <span class="cnt" id="cntEventual">0</span>
                </div>
                <form class="form-alta" data-tipo="EVENTUAL">
                    <div class="alta-input-wrap">
                        <input type="text" class="alta-nombre" placeholder="APELLIDO PATERNO  MATERNO  NOMBRE(S)" autocomplete="off">
                        <div class="sugerencias" hidden></div>
                    </div>
                    <button type="submit" class="btn-alta btn-alta--eventual">＋ Dar de alta</button>
                </form>
                <ul class="lista" id="listaEventual"></ul>
            </section>
        </div>
    </div>

    <div class="modal" id="modalConfirm">
        <div class="modal-card">
            <h3 class="mc-titulo"></h3>
            <p class="mc-mensaje"></p>
            <div class="mc-btns">
                <button class="mc-cancel">Cancelar</button>
                <button class="mc-ok">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { db } from '../../../firebase-config.js';
        window.db = db;
    </script>
    <script type="module" src="adminTrabajadores.js"></script>
</body>
</html>
