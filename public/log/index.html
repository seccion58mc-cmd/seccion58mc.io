<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSMC — Centro de Comando</title>
    <meta name="description" content="Acceso al panel administrativo SSMC — Sindicato Nacional de Trabajadores.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ── Tokens ── */
        :root {
            --bg-base:      #080C14;
            --bg-surface:   #0D1220;
            --bg-card:      #111827;
            --blue:         #2979FF;
            --blue-bright:  #00E5FF;
            --blue-dim:     #1565C0;
            --text-primary: #F0F4FF;
            --text-sec:     #8FA3C0;
            --text-dim:     #4A6080;
            --border:       rgba(41,121,255,0.18);
            --border-bright:rgba(41,121,255,0.45);
            --glow:         0 0 32px rgba(41,121,255,0.28);
            --radius:       14px;
            --transition:   0.25s cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ── Particles ── */
        #particles-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Grid lines overlay ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(41,121,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(41,121,255,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── Radial glow center ── */
        .radial-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse at center, rgba(41,121,255,0.12) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }



        /* ── Status bar bottom ── */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(13,18,32,0.95);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 0 24px;
            z-index: 10;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00BFA5;
            box-shadow: 0 0 6px #00BFA5;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-item { display: flex; align-items: center; gap: 6px; }

        /* ── Main wrapper ── */
        .login-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 40px;
        }

        /* ── Header badge ── */
        .login-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(41,121,255,0.08);
            border: 1px solid var(--border-bright);
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--blue-bright);
            margin-bottom: 28px;
        }
        .login-badge i { font-size: 10px; }

        /* ── Logo + Title ── */
        .login-logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 88px;
            height: 88px;
            object-fit: contain;
            filter: drop-shadow(0 0 16px rgba(41,121,255,0.6));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .login-org-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-sec);
            text-align: center;
        }
        .login-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .login-title span {
            background: linear-gradient(90deg, var(--blue), var(--blue-bright));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Card ── */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(17,24,39,0.92);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius);
            padding: 36px 32px;
            box-shadow: var(--glow), 0 8px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue), var(--blue-bright), var(--blue));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Form ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-sec);
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
            transition: color var(--transition);
        }

        .input-wrap input {
            width: 100%;
            background: rgba(41,121,255,0.06);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px 12px 42px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
        }

        .input-wrap input::placeholder { color: var(--text-dim); }

        .input-wrap input:focus {
            border-color: var(--blue);
            background: rgba(41,121,255,0.1);
            box-shadow: 0 0 0 3px rgba(41,121,255,0.15);
        }

        .input-wrap input:focus + i,
        .input-wrap:focus-within i { color: var(--blue); }

        /* Reorder so icon is accessible for CSS sibling (fix: put icon before) */
        .input-icon-left { order: -1; }

        /* ── Submit button ── */
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--blue), var(--blue-dim));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(41,121,255,0.45);
        }
        .submit-btn:hover::before { opacity: 1; }
        .submit-btn:active { transform: translateY(0); }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error / success messages ── */
        .login-msg {
            display: none;
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }
        .login-msg.error {
            background: rgba(229,57,53,0.12);
            border: 1px solid rgba(229,57,53,0.3);
            color: #FF5252;
        }
        .login-msg.success {
            background: rgba(0,191,165,0.12);
            border: 1px solid rgba(0,191,165,0.3);
            color: #00BFA5;
        }

        /* ── Scan line animation ── */
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(41,121,255,0.4), transparent);
            animation: scan 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0%   { top: 0%; opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; }
            .login-title { font-size: 22px; }
            .login-logo { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>

<!-- Visual layers -->
<canvas id="particles-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="radial-glow"></div>


<!-- Status bar -->
<div class="status-bar">
    <div class="status-item">
        <div class="status-dot"></div>
        <span>SISTEMA EN LINEA</span>
    </div>
    <div class="status-item">
        <i class="fa-solid fa-database" style="font-size:10px;color:var(--blue)"></i>
        <span>FIRESTORE CONECTADO</span>
    </div>
    <div class="status-item" id="clock-display">
        <i class="fa-solid fa-clock" style="font-size:10px;color:var(--blue)"></i>
        <span id="status-time">--:--:--</span>
    </div>
</div>

<!-- Main -->
<div class="login-wrapper">

    <div class="login-badge">
        <i class="fa-solid fa-lock"></i>
        Acceso Restringido — Panel Administrativo
    </div>

    <div class="login-logo-wrap">
        <img src="../assets/sindicatoLogo.png" alt="SSMC Logo" class="login-logo">
        <div class="login-org-name">Sindicato Nacional de Trabajadores</div>
        <h1 class="login-title">Centro de <span>Comando</span></h1>
    </div>

    <div class="login-card">
        <div class="scan-line"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Ingresa tu usuario"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contrasena</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-key"></i>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contrasena"
                        autocomplete="current-password"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <div class="btn-content">
                    <div class="spinner" id="btn-spinner"></div>
                    <i class="fa-solid fa-right-to-bracket" id="btn-icon"></i>
                    <span id="btn-label">Ingresar al Sistema</span>
                </div>
            </button>
        </form>

        <div class="login-msg" id="login-msg"></div>
    </div>

</div>

<!-- tsParticles -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

<script>
// ── Particles ──
(async () => {
    if (typeof tsParticles === 'undefined') return;
    await tsParticles.load({
        id: 'particles-canvas',
        element: document.getElementById('particles-canvas'),
        options: {
            fullScreen: false,
            background: { color: 'transparent' },
            fpsLimit: 60,
            particles: {
                number: { value: 70, density: { enable: true, area: 900 } },
                color: { value: ['#2979FF', '#00E5FF', '#1565C0', '#ffffff'] },
                shape: { type: 'circle' },
                opacity: { value: 0.2, random: true },
                size: { value: { min: 1, max: 2.5 }, random: true },
                links: {
                    enable: true,
                    distance: 130,
                    color: '#2979FF',
                    opacity: 0.12,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 0.5,
                    direction: 'none',
                    outModes: { default: 'bounce' }
                }
            },
            interactivity: {
                events: {
                    onHover: { enable: true, mode: 'grab' },
                    resize: true
                },
                modes: { grab: { distance: 140, links: { opacity: 0.35 } } }
            },
            detectRetina: true
        }
    });
})();

// ── Clock ──
function updateClock() {
    const now = new Date();
    document.getElementById('status-time').textContent =
        now.toLocaleTimeString('es-MX', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);
</script>

<!-- Firebase Login Logic -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCcBqpSXsz_wqm3xyg0NSJYnvQTK0NhkXg",
        authDomain: "formatovacaciones.firebaseapp.com",
        projectId: "formatovacaciones",
        storageBucket: "formatovacaciones.firebasestorage.app",
        messagingSenderId: "753669687689",
        appId: "1:753669687689:web:b37af5de6ba6b1391ef958",
        measurementId: "G-LMKRM8VKM7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form       = document.getElementById('login-form');
    const submitBtn  = document.getElementById('submit-btn');
    const spinner    = document.getElementById('btn-spinner');
    const btnIcon    = document.getElementById('btn-icon');
    const btnLabel   = document.getElementById('btn-label');
    const loginMsg   = document.getElementById('login-msg');

    function setLoading(loading) {
        submitBtn.disabled = loading;
        spinner.style.display  = loading ? 'block' : 'none';
        btnIcon.style.display  = loading ? 'none'  : 'block';
        btnLabel.textContent   = loading ? 'Verificando...' : 'Ingresar al Sistema';
    }

    function showMsg(text, type) {
        loginMsg.textContent  = text;
        loginMsg.className    = `login-msg ${type}`;
        loginMsg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginMsg.style.display = 'none';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        setLoading(true);

        try {
            const q = query(
                collection(db, 'pacoLog'),
                where('user', '==', username),
                where('password', '==', password)
            );
            const snap = await getDocs(q);

            if (!snap.empty) {
                showMsg('Acceso concedido — Redirigiendo...', 'success');
                sessionStorage.setItem('pdfAuth', 'true');
                sessionStorage.setItem('user', username);
                setTimeout(() => {
                    window.location.href = 'pdfs/index.html';
                }, 900);
            } else {
                showMsg('Usuario o contrasena incorrectos.', 'error');
                setLoading(false);
            }
        } catch (err) {
            console.error(err);
            showMsg('Error de conexion. Intenta nuevamente.', 'error');
            setLoading(false);
        }
    });
</script>

</body>
</html>
